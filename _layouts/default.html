<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} &middot; {{ site.name }}{% else %}{{ site.name }}{% endif %}</title>
    <meta name="author" content="Jason Barbier" />
    <link rel="stylesheet" href="{{"/theme/default/layout.css?v=7" | relative_url}}" />
    <link rel="stylesheet" href="{{"/theme/default/syntaxhighlight.css" | relative_url}}" />
    <link rel="canonical" href="{{ site.url }}{{ page.url }}" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{"/blog/feed.xml" | relative_url}}" />
    <link rel="icon" type="image/png" href="/img/favicon.png" sizes="48x48" />
    {% seo %}
  </head>
  <body>

    <div class="neon-sun" aria-hidden="true"></div>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="header">
        <div class="headerleft">
            <span><img src="/img/title.png" alt="Cyberdyne Systems" width="300" height="50" /></span>
            <a href="{{"/blog/feed.xml" | relative_url}}"><img src="/img/rss.gif" alt="Stalk this page with RSS" width="35" height="13" loading="lazy"></a>
        <a href="https://creativecommons.org/licenses/by/4.0/"><img height="15" width="80" src="/img/ccby.png" alt="CC-BY" loading="lazy"/></a>
        </div>
        <div class="headerright nav-right">
            <ul class="nav">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/wishlist.html">Wishlist</a></li>
                <li><a href="/blog">Blog</a></li>
            </ul>
        </div>
    </div>

    <main class="section" id="main" tabindex="-1">
    {{ content }}
    <br/>
    </main>

    <footer>
      <div class="footer-inner">
        <span class="tagline">Dirty hacks: Done dirt cheap</span>
        <span class="footer-links">
          <a href="https://masto.hackers.town/@kusuriya" rel="me">Mastodon</a> &middot;
          <a href="https://github.com/kusuriya">GitHub</a> &middot;
          <a href="https://www.linkedin.com/in/jas-bar">LinkedIn</a> &middot;
          <a href="https://kusuriya.omg.lol">Contact</a>
        </span>
        <span class="copy">&copy; Jason Barbier &middot; CC-BY 4.0</span>
      </div>
    </footer>

  </body>
</html>
